<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(
        pageTitle='Sửa sản phẩm',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head><style></style></head>
<body>
<main-content>
  <div class="form-header">
    <h1><i class="fa-solid fa-edit"></i> Sửa sản phẩm</h1>
  </div>

  <form class="product-form" method="post"
        th:action="@{/admin/products/edit/{id}(id=${product.id})}"
        enctype="multipart/form-data">

    <div class="form-section">
      <div class="form-section-title">Thông tin cơ bản</div>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Tên sản phẩm *</label>
          <input type="text" id="name" name="name" th:value="${product.name}" required/>
        </div>
        <div class="form-group">
          <label for="category">Danh mục *</label>
          <select id="category" name="category" required>
            <option th:each="cat : ${categories}"
                    th:value="${cat}" th:text="${cat}"
                    th:selected="${cat == product.category}"></option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="brand">Thương hiệu</label>
          <input type="text" id="brand" name="brand" th:value="${product.brand}"/>
        </div>
        <div class="form-group">
          <label for="origin">Xuất xứ</label>
          <input type="text" id="origin" name="origin" th:value="${product.origin}"/>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Mô tả</div>
      <div class="form-group">
        <label for="description">Mô tả sản phẩm</label>
        <textarea id="description" name="description"
                  th:text="${product.description}"></textarea>
      </div>
      <div class="form-group" style="margin-top:1rem">
        <label for="specifications">Thông số kỹ thuật</label>
        <textarea id="specifications" name="specifications"
                  th:text="${product.specifications}"></textarea>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Giá &amp; Kho</div>
      <div class="form-row">
        <div class="form-group">
          <label for="price">Giá (VNĐ) *</label>
          <input type="number" id="price" name="price"
                 th:value="${product.price}" required min="0" step="1000"/>
        </div>
        <div class="form-group">
          <label for="stock">Số lượng kho *</label>
          <input type="number" id="stock" name="stock"
                 th:value="${product.stock}" required min="0"/>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Hình ảnh</div>
      <div th:if="${product.imageUrl}" class="form-group">
        <label>Hình ảnh hiện tại</label>
        <img th:src="${product.imageUrl}" alt="Product"
             class="current-image"
             th:onerror="this.src='/images/placeholder.jpg'"/>
      </div>
      <div class="form-group" style="margin-top:.75rem">
        <label for="imageFile">Thay đổi hình ảnh</label>
        <input type="file" id="imageFile" name="imageFile" accept="image/*"/>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Đặc điểm</div>
      <div class="checkbox-group">
        <input type="checkbox" id="isFeatured" name="isFeatured"
               th:checked="${product.isFeatured}"/>
        <label for="isFeatured">Hiển thị trên trang chủ (nổi bật)</label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-save"></i> Cập nhật sản phẩm
      </button>
      <a th:href="@{/admin/products}" class="btn-cancel">
        <i class="fa-solid fa-times"></i> Hủy
      </a>
    </div>
  </form>
</main-content>
</body>
</html>
