<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(
        pageTitle='Quản lý Đơn hàng',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head><style></style></head>
<body>
<main-content>
  <div class="order-header">
    <h1><i class="fa-solid fa-receipt"></i> Quản lý Đơn hàng</h1>
  </div>

  <div th:if="${orders != null and orders.size() > 0}">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Mã đơn</th>
          <th>Khách hàng</th>
          <th>Số tiền</th>
          <th>Phương thức TT</th>
          <th>Trạng thái TT</th>
          <th>Trạng thái đơn</th>
          <th>Ngày đặt</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="order : ${orders}">
          <td th:text="'#' + ${order.id}"></td>
          <td th:text="${order.fullName}"></td>
          <td class="order-amount"
              th:text="'₫' + ${#numbers.formatInteger(order.totalAmount,0,'COMMA')}"></td>
          <td th:text="${order.paymentMethod.displayName}"></td>
          <td>
            <span class="payment-status"
                  th:classappend="${order.paymentStatus.name() == 'PAID' ? 'payment-paid' : 'payment-unpaid'}"
                  th:text="${order.paymentStatus.displayName}"></span>
          </td>
          <td>
            <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}"
                  method="post" class="status-form">
              <select name="status" class="status-select">
                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:text="${status.displayName}"
                        th:selected="${status == order.status}"></option>
              </select>
              <button type="submit" class="btn-update">Cập nhật</button>
            </form>
          </td>
          <td th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <a th:href="@{/admin/orders}" class="btn-edit">
              <i class="fa-solid fa-eye"></i> Xem
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${orders == null or orders.size() == 0}" class="empty-message">
    <i class="fa-solid fa-inbox"></i>
    <p>Không có đơn hàng nào</p>
  </div>
</main-content>
</body>
</html>
