<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(
        pageTitle='Đăng nhập Admin',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head>
  <style>
    /* ── Reset layout để full-page căn giữa ── */
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4ef;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .admin-login-card {
      width: min(100%, 420px);
      background: #fff;
      border: 1px solid #e4e2db;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.04);
      padding: 36px 32px 32px;
    }

    /* ── Header ── */
    .admin-login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .admin-login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 79, 63, .1);
      color: #0f4f3f;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .admin-login-badge i { font-size: 10px; }
    .admin-login-header h2 {
      margin: 0 0 6px;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -.04em;
      color: #111;
    }
    .admin-login-header p {
      margin: 0;
      color: #7a7870;
      font-size: 14px;
    }

    /* ── Form groups ── */
    .al-form-group { margin-bottom: 16px; }
    .al-form-group label {
      display: block;
      margin-bottom: 7px;
      color: #0f4f3f;
      font-weight: 800;
      font-size: 13px;
    }
    .al-form-group input {
      width: 100%;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid #e4e2db;
      border-radius: 8px;
      outline: 0;
      background: #fbfaf6;
      color: #111;
      font-size: 15px;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .al-form-group input:focus {
      border-color: rgba(15, 79, 63, .36);
      box-shadow: 0 0 0 4px rgba(15, 79, 63, .08);
    }

    /* ── Password toggle ── */
    .al-password-field { position: relative; }
    .al-password-field input { padding-right: 48px; }
    .al-password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: #7a7870;
      border-radius: 50%;
      border: none;
      background: none;
      cursor: pointer;
      transform: translateY(-50%);
      transition: color .2s ease, background .2s ease;
    }
    .al-password-toggle:hover {
      color: #0f4f3f;
      background: rgba(15, 79, 63, .08);
    }

    /* ── Messages ── */
    .al-message {
      padding: 11px 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    .al-message.error {
      color: #b83232;
      background: rgba(184, 50, 50, .08);
      border: 1px solid rgba(184, 50, 50, .18);
    }
    .al-message.success {
      color: #147348;
      background: rgba(20, 115, 72, .08);
      border: 1px solid rgba(20, 115, 72, .18);
    }

    /* ── Submit button — khớp với .btn.btn-primary của user ── */
    .al-btn-submit {
      width: 100%;
      min-height: 46px;
      margin-top: 8px;
      background: #0f4f3f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s ease, transform .15s ease, box-shadow .2s ease;
    }
    .al-btn-submit:hover {
      background: #0a3a2d;
      box-shadow: 0 4px 14px rgba(15, 79, 63, .25);
      transform: translateY(-1px);
    }
    .al-btn-submit:active { transform: translateY(0); }

    /* ── Divider ── */
    .al-divider {
      margin: 20px 0 0;
      padding-top: 18px;
      border-top: 1px solid #e4e2db;
      text-align: center;
      color: #7a7870;
      font-size: 13px;
    }
    .al-divider a {
      color: #0f4f3f;
      font-weight: 800;
      text-decoration: none;
    }
    .al-divider a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<main-content>
  <div class="admin-login-page">
    <div class="admin-login-card">

      <div class="admin-login-header">
        <div class="admin-login-badge">
          <i class="fa-solid fa-shield-halved"></i> Quản trị viên
        </div>
        <h2>Đăng nhập Admin</h2>
        <p>Chỉ dành cho quản trị viên Hung Gaming Shop.</p>
      </div>

      <form method="post" th:action="@{/admin/auth/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:if="${error}" class="al-message error">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="al-message success">
          <i class="fa-solid fa-circle-check"></i>
          <span th:text="${message}"></span>
        </div>

        <div class="al-form-group">
          <label for="loginId">Tên đăng nhập hoặc email</label>
          <input type="text" id="loginId" name="loginId"
                 placeholder="admin hoặc admin@shop.com" required/>
        </div>

        <div class="al-form-group">
          <label for="password">Mật khẩu</label>
          <div class="al-password-field">
            <input type="password" id="password" name="password"
                   placeholder="••••••" required/>
            <button class="al-password-toggle" type="button"
                    data-toggle-password="password" aria-label="Hiện mật khẩu">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="al-btn-submit">
          <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
        </button>
      </form>

    </div>
  </div>
</main-content>
<script>
document.querySelectorAll('[data-toggle-password]').forEach((button) => {
  button.addEventListener('click', () => {
    const input = document.getElementById(button.dataset.togglePassword);
    const icon = button.querySelector('i');
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    icon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    button.setAttribute('aria-label', show ? 'Ẩn mật khẩu' : 'Hiện mật khẩu');
  });
});
</script>
</body>
</html>
