<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(
        pageTitle='Quản lý Sản phẩm',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head><style></style></head>
<body>
<main-content>
  <div class="product-header">
    <h1><i class="fa-solid fa-box"></i> Quản lý Sản phẩm</h1>
    <a th:href="@{/admin/products/add}" class="btn-add">
      <i class="fa-solid fa-plus"></i> Thêm sản phẩm
    </a>
  </div>

  <div th:if="${products != null and products.size() > 0}">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Hình ảnh</th>
          <th>Tên sản phẩm</th>
          <th>Danh mục</th>
          <th>Giá</th>
          <th>Kho</th>
          <th>Nổi bật</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="product : ${products}">
          <td>
            <img th:src="${product.imageUrl}" alt="Product"
                 class="product-image"
                 th:onerror="this.src='/images/placeholder.jpg'"/>
          </td>
          <td th:text="${product.name}"></td>
          <td th:text="${product.category}"></td>
          <td class="price-cell"
              th:text="'₫' + ${#numbers.formatInteger(product.price,0,'COMMA')}"></td>
          <td th:text="${product.stock}"></td>
          <td th:text="${product.isFeatured ? 'Có' : 'Không'}"></td>
          <td>
            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn-edit">
              <i class="fa-solid fa-edit"></i> Sửa
            </a>
            <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Xác nhận xóa sản phẩm này?')">
              <button type="submit" class="btn-delete">
                <i class="fa-solid fa-trash"></i> Xóa
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${products == null or products.size() == 0}" class="empty-message">
    <i class="fa-solid fa-inbox"></i>
    <p>Không có sản phẩm nào</p>
  </div>
</main-content>
</body>
</html>
