<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(
        pageTitle='Dashboard',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head><style></style></head>
<body>
<main-content>
  <div class="dashboard-header">
    <h1><i class="fa-solid fa-chart-line"></i> Dashboard</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Doanh thu</div>
      <div class="stat-value"
           th:text="${totalRevenue} != null ? '₫' + ${#numbers.formatInteger(totalRevenue,0,'COMMA')} : '₫0'"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tổng đơn hàng</div>
      <div class="stat-value" th:text="${totalOrders}"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Chờ xử lý</div>
      <div class="stat-value" th:text="${pendingOrders}"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sản phẩm</div>
      <div class="stat-value" th:text="${totalProducts}"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Người dùng</div>
      <div class="stat-value" th:text="${totalUsers}"></div>
    </div>
  </div>

  <div class="dashboard-section">
    <div class="section-title">
      <i class="fa-solid fa-chart-bar"></i> Biểu đồ doanh thu
    </div>
    <div class="chart-placeholder">
      <p>Chart visualization would render here</p>
    </div>
  </div>

  <div class="dashboard-section">
    <div class="section-title">
      <i class="fa-solid fa-receipt"></i> Đơn hàng gần đây
    </div>
    <div th:if="${recentOrders != null and recentOrders.size() > 0}">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Khách hàng</th>
            <th>Số tiền</th>
            <th>Trạng thái</th>
            <th>Ngày đặt</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${recentOrders}">
            <td th:text="'#' + ${order.id}"></td>
            <td th:text="${order.fullName}"></td>
            <td class="order-amount" th:text="'₫' + ${#numbers.formatInteger(order.totalAmount,0,'COMMA')}"></td>
            <td th:text="${order.status.displayName}"></td>
            <td th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div th:if="${recentOrders == null or recentOrders.size() == 0}" class="empty-message">
      <i class="fa-solid fa-inbox"></i>
      <p>Chưa có đơn hàng nào</p>
    </div>
  </div>
</main-content>
</body>
</html>
