<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(pageTitle,pageStyles,pageScripts,content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Admin Dashboard - Hung Gaming Shop"/>
  <title th:text="${pageTitle} + ' | Admin - Hung Gaming Shop'">Admin - Hung Gaming Shop</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}"/>
  <link rel="stylesheet" th:href="@{/css/admin/auth.css}"/>
  <th:block th:replace="${pageStyles}"></th:block>
</head>
<body>
<div class="alert-container">
  <div th:if="${message}" class="alert alert-success">
    <i class="fa-solid fa-circle-check"></i>
    <span th:text="${message}"></span>
    <span class="alert-close"><i class="fa-solid fa-xmark"></i></span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <span th:text="${error}"></span>
    <span class="alert-close"><i class="fa-solid fa-xmark"></i></span>
  </div>
</div>

<nav class="admin-navbar">
  <div class="admin-navbar-inner">
    <div class="admin-logo">
      <a th:href="@{/admin/dashboard}">
        <i class="fa-solid fa-bolt"></i> Admin Panel
      </a>
    </div>
    <div class="admin-nav-menu">
      <a th:href="@{/admin/dashboard}" class="admin-nav-link">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </a>
      <a th:href="@{/admin/products}" class="admin-nav-link">
        <i class="fa-solid fa-box"></i> Sản phẩm
      </a>
      <a th:href="@{/admin/orders}" class="admin-nav-link">
        <i class="fa-solid fa-receipt"></i> Đơn hàng
      </a>
      <a th:href="@{/admin/messages}" class="admin-nav-link">
        <i class="fa-solid fa-message"></i> Tin nhắn
        <span class="nav-badge" th:if="${unreadMessageCount != null and unreadMessageCount > 0}"
              th:text="${unreadMessageCount}">0</span>
      </a>
    </div>
    <div class="admin-nav-right">
      <span class="admin-user-name" sec:authentication="name"></span>
      <form th:action="@{/admin/auth/logout}" method="post" style="margin:0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="admin-nav-link logout" style="background:none;border:none;cursor:pointer;padding:0;font:inherit">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
        </button>
      </form>
    </div>
  </div>
</nav>

<main class="admin-main">
  <div class="admin-container">
    <th:block th:replace="${content}"></th:block>
  </div>
</main>

<footer class="admin-footer">
  <p>&copy; 2026 Hung Gaming Shop Admin Dashboard.</p>
</footer>

<script th:src="@{/js/admin/dashboard.js}"></script>
<th:block th:if="${pageScripts != null}">
    <div th:replace="${pageScripts}"></div>
</th:block>
</body>
</html>
