<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: layout(
        pageTitle='Đặt hàng thành công',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head>
  <style>
    .success-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 70px);
      padding: 2rem;
    }

    .success-box {
      text-align: center;
      animation: slideInUp 0.6s ease-out;
    }

    .success-icon {
      font-size: 5rem;
      color: var(--accent);
      margin-bottom: 1rem;
      animation: bounce 0.6s ease-out;
    }

    .success-title {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .success-desc {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-size: 1rem;
      line-height: 1.6;
    }

    .order-info {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .info-item {
      border-left: 2px solid rgba(0, 212, 255, 0.2);
      padding-left: 1rem;
    }

    .info-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 1rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .info-value.highlight {
      color: var(--accent);
      font-size: 1.2rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .btn-primary-action {
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #000;
    }

    .btn-primary-action:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-secondary-action {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary-action:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
<main-content>
  <div class="success-container">
    <div class="success-box">
      <div class="success-icon">
        <i class="fa-solid fa-check-circle"></i>
      </div>
      <h1 class="success-title">Đặt hàng thành công!</h1>
      <p class="success-desc">
        Cảm ơn bạn đã đặt hàng.<br/>
        Chúng tôi sẽ xác nhận đơn hàng của bạn trong thời gian sớm nhất.
      </p>

      <div class="order-info">
        <div class="info-row">
          <div class="info-item">
            <div class="info-label">Mã đơn hàng</div>
            <div class="info-value highlight" th:text="'#' + ${order.id}"></div>
          </div>
          <div class="info-item">
            <div class="info-label">Trạng thái</div>
            <div class="info-value" th:text="${order.status.displayName}"></div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-item">
            <div class="info-label">Tổng tiền</div>
            <div class="info-value" th:text="'₫' + ${#numbers.formatInteger(order.totalAmount, 0)}"></div>
          </div>
          <div class="info-item">
            <div class="info-label">Phương thức thanh toán</div>
            <div class="info-value" th:text="${order.paymentMethod.displayName}"></div>
          </div>
        </div>

        <div class="info-row">
          <div class="info-item">
            <div class="info-label">Người nhận</div>
            <div class="info-value" th:text="${order.fullName}"></div>
          </div>
          <div class="info-item">
            <div class="info-label">Số điện thoại</div>
            <div class="info-value" th:text="${order.phone}"></div>
          </div>
        </div>

        <div class="info-row" style="grid-template-columns: 1fr;">
          <div class="info-item">
            <div class="info-label">Địa chỉ giao hàng</div>
            <div class="info-value" th:text="${order.address}"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a th:href="@{/orders}" class="btn-action btn-primary-action">
          <i class="fa-solid fa-receipt"></i> Xem đơn hàng
        </a>
        <a th:href="@{/}" class="btn-action btn-secondary-action">
          <i class="fa-solid fa-home"></i> Về trang chủ
        </a>
      </div>
    </div>
  </div>
</main-content>
</body>
</html>
