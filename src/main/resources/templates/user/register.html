<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: layout(
        pageTitle='Dang ky',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">
<head>
  <style>
    .auth-container {
      width: min(100% - 32px, 500px);
      margin: 56px auto;
    }
    .auth-form {
      padding: 30px;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-header h1 { margin: 0 0 8px; letter-spacing: -0.05em; }
    .auth-header p { margin: 0; color: var(--muted); }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: var(--brand);
      font-weight: 800;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      background: #fbfaf6;
      color: var(--ink);
    }
    .password-field {
      position: relative;
    }
    .password-field input {
      padding-right: 48px;
    }
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border-radius: 50%;
      transform: translateY(-50%);
    }
    .password-toggle:hover {
      color: var(--brand);
      background: rgba(15, 79, 63, .08);
    }
    .auth-message {
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      color: var(--danger);
      background: rgba(184, 50, 50, .08);
      border: 1px solid rgba(184, 50, 50, .18);
      font-size: 14px;
    }
    .auth-footer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .auth-footer a { color: var(--brand); font-weight: 800; }
  </style>
</head>
<body>
<main-content>
  <section class="auth-container">
    <form class="auth-form" method="post" th:action="@{/auth/register}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="auth-header">
        <h1><i class="fa-solid fa-user-plus"></i> Dang ky</h1>
        <p>Tao tai khoan de mua sam va theo doi don hang.</p>
      </div>

      <div th:if="${error}" class="auth-message" th:text="${error}"></div>

      <div class="form-group">
        <label for="fullName">Ho ten</label>
        <input type="text" id="fullName" name="fullName" required/>
      </div>

      <div class="form-group">
        <label for="username">Ten dang nhap</label>
        <input type="text" id="username" name="username" placeholder="vi du: hunggaming" required/>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required/>
      </div>

      <div class="form-group">
        <label for="phone">So dien thoai</label>
        <input type="tel" id="phone" name="phone"/>
      </div>

      <div class="form-group">
        <label for="password">Mat khau</label>
        <div class="password-field">
          <input type="password" id="password" name="password" required/>
          <button class="password-toggle" type="button" data-toggle-password="password" aria-label="Hien mat khau">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Nhap lai mat khau</label>
        <div class="password-field">
          <input type="password" id="confirmPassword" name="confirmPassword" required/>
          <button class="password-toggle" type="button" data-toggle-password="confirmPassword" aria-label="Hien mat khau">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-wide">
        <i class="fa-solid fa-user-plus"></i> Dang ky
      </button>

      <div class="auth-footer">
        Da co tai khoan? <a th:href="@{/auth/login}">Dang nhap</a>
      </div>
    </form>
  </section>
</main-content>
<script>
document.querySelectorAll('[data-toggle-password]').forEach((button) => {
  button.addEventListener('click', () => {
    const input = document.getElementById(button.dataset.togglePassword);
    const icon = button.querySelector('i');
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    icon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    button.setAttribute('aria-label', show ? 'An mat khau' : 'Hien mat khau');
  });
});
</script>
</body>
</html>
