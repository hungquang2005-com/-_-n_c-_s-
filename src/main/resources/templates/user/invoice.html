<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user/layout :: layout(
        pageTitle='Hóa đơn xác nhận',
        pageStyles=~{::style},
        pageScripts=~{::script},
        content=~{::main-content}
      )}">

<head>
  <style>

    .invoice-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      animation: pageEnter 0.6s ease-out;
    }

    .invoice-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .invoice-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .invoice-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .invoice-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .invoice-section:last-child {
      border-bottom: none;
    }

    .invoice-section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .invoice-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .invoice-item {
      font-size: 0.9rem;
    }

    .invoice-item-label {
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      font-size: 0.8rem;
    }

    .invoice-item-value {
      color: var(--text-primary);
      font-weight: 500;
    }

    .invoice-items-table {
      width: 100%;
      border-collapse: collapse;
    }

    .invoice-items-table th {
      text-align: left;
      padding: 0.75rem;
      background: rgba(0, 212, 255, 0.05);
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .invoice-items-table td {
      padding: 1rem 0.75rem;
      border-bottom: 1px solid rgba(0, 212, 255, 0.05);
    }

    .invoice-total {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .invoice-total-box {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      text-align: right;
      min-width: 300px;
    }

    .invoice-total-label {
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .invoice-total-amount {
      font-size: 2rem;
      color: var(--accent);
      font-weight: 700;
    }

    .payment-method-box {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: center;
    }

    .btn-confirm,
    .btn-back {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-confirm {
      background: linear-gradient(
              135deg,
              var(--accent),
              #0099cc
      );
      color: #000;
    }

    .btn-confirm:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
    }

  </style>
</head>

<body>

<main-content>

  <div class="invoice-container">

    <div class="invoice-header">
      <h1>
        <i class="fa-solid fa-file-invoice"></i>
        Hóa Đơn Xác Nhận
      </h1>

      <p>
        Vui lòng kiểm tra thông tin trước khi xác nhận thanh toán
      </p>
    </div>

    <form class="invoice-box"
          method="post"
          th:action="@{/checkout/confirm}">

      <!-- CSRF -->
      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <!-- Shipping Info -->
      <div class="invoice-section">

        <div class="invoice-section-title">
          Thông tin giao hàng
        </div>

        <div class="invoice-info">

          <div class="invoice-item">
            <div class="invoice-item-label">
              Họ và tên
            </div>

            <div class="invoice-item-value"
                 th:text="${fullName}">
            </div>
          </div>

          <div class="invoice-item">
            <div class="invoice-item-label">
              Email
            </div>

            <div class="invoice-item-value"
                 th:text="${email}">
            </div>
          </div>

          <div class="invoice-item">
            <div class="invoice-item-label">
              Số điện thoại
            </div>

            <div class="invoice-item-value"
                 th:text="${phone}">
            </div>
          </div>

          <div class="invoice-item">
            <div class="invoice-item-label">
              Địa chỉ giao hàng
            </div>

            <div class="invoice-item-value"
                 th:text="${address}">
            </div>
          </div>

        </div>

      </div>

      <!-- Items -->
      <div class="invoice-section">

        <div class="invoice-section-title">
          Sản phẩm
        </div>

        <table class="invoice-items-table">

          <thead>
          <tr>
            <th>Sản phẩm</th>

            <th style="text-align: center;">
              Số lượng
            </th>

            <th style="text-align: right;">
              Giá
            </th>

            <th style="text-align: right;">
              Thành tiền
            </th>
          </tr>
          </thead>

          <tbody>

          <tr th:each="item : ${cart.items}">

            <td th:text="${item.product.name}">
            </td>

            <td style="text-align: center;"
                th:text="${item.quantity}">
            </td>

            <td style="text-align: right;"
                th:text="'₫' + ${#numbers.formatInteger(item.product.price, 0)}">
            </td>

            <td style="
                    text-align: right;
                    color: var(--accent);
                    font-weight: 600;"
                th:text="'₫' + ${#numbers.formatInteger(item.subtotal, 0)}">
            </td>

          </tr>

          </tbody>

        </table>

      </div>

      <!-- Total -->
      <div class="invoice-total">

        <div class="invoice-total-box">

          <div class="invoice-total-label">
            Tổng tiền
          </div>

          <div class="invoice-total-amount"
               th:text="'₫' + ${#numbers.formatInteger(cart.totalAmount, 0)}">
          </div>

          <div class="payment-method-box">

            <div style="
                    font-size: 0.9rem;
                    color: var(--text-secondary);">

              Phương thức thanh toán:

            </div>

            <div style="
                    font-weight: 600;
                    margin-top: 0.5rem;"
                 th:text="${paymentMethod}">
            </div>

          </div>

        </div>

      </div>

      <!-- Hidden -->
      <input type="hidden"
             name="paymentMethod"
             th:value="${paymentMethod}"/>

      <!-- Actions -->
      <div class="actions">

        <button type="submit"
                class="btn-confirm">

          <i class="fa-solid fa-check"></i>
          Xác nhận thanh toán

        </button>

        <a th:href="@{/checkout/payment}"
           class="btn-back">

          <i class="fa-solid fa-arrow-left"></i>
          Quay lại

        </a>

      </div>

    </form>

  </div>

</main-content>

</body>
</html>
