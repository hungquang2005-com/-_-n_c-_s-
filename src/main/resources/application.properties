spring.application.name=hunggaming_shop
# ==========================================
# SERVER CONFIG
# ==========================================
server.port=8090

# ==========================================
# DATABASE - XAMPP MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/hunggaming_shop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==========================================
# FILE UPLOAD (ảnh sản phẩm)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# STATIC RESOURCES
# ==========================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ==========================================
# APP CONFIG
# ==========================================
app.upload.dir=src/main/resources/static/images/products